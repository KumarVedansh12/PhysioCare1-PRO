{% extends "emails/base.html" %}{% block email_content %}
<h1 style="font-size:28px;line-height:1.25;margin:0 0 14px">New website enquiry</h1>
<p><strong>{{ contact.subject }}</strong></p>
<p><strong>From:</strong> {{ contact.name }}<br><strong>Email:</strong> {{ contact.email }}{% if contact.phone %}<br><strong>Phone:</strong> {{ contact.phone }}{% endif %}</p>
<div style="background:#eef8f1;padding:18px;border-radius:12px;white-space:pre-line">{{ contact.message }}</div>
{% endblock %}
