upstream physiocare_app {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name physiocare.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name physiocare.example.com;

    ssl_certificate /etc/letsencrypt/live/physiocare.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/physiocare.example.com/privkey.pem;

    client_max_body_size 25m;

    location /static/ {
        alias /srv/physiocare/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        # Private patient files are delivered only by authenticated Django views.
        return 404;
    }

    location /healthz/ {
        proxy_pass http://physiocare_app;
        proxy_set_header Host $host;
        access_log off;
    }

    location / {
        proxy_pass http://physiocare_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 75s;
    }
}
